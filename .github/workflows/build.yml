name: Build VCamJoy Tweak DEB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Setup Theos
      run: |
        export THEOS=$HOME/theos
        git clone --recursive https://github.com/theos/theos $THEOS
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH

    - name: Install SDK
      run: |
        curl -LO "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz"
        tar xf iPhoneOS16.5.sdk.tar.xz -C $HOME/theos/sdks/

    - name: Install tools
      run: brew install ldid dpkg xz

    - name: Build dylib
      run: |
        export THEOS=$HOME/theos
        export PATH=$THEOS/bin:$PATH
        # Dùng clang của Xcode, không dùng /var/jb
        export SDKVERSION=16.5
        export TARGET_CC=$(xcrun --sdk iphoneos --find clang)
        export TARGET_CXX=$(xcrun --sdk iphoneos --find clang++)
        export SYSROOT=$(xcrun --sdk iphoneos --show-sdk-path)
        
        make FINALPACKAGE=1 \
          TARGET=iphone:clang:16.5:15.0 \
          ARCHS="arm64 arm64e" 2>&1

    - name: Package roothide DEB
      run: |
        # Find built dylib
        DYLIB=$(find .theos -name "VCamJoyTweak.dylib" 2>/dev/null | head -1)
        if [ -z "$DYLIB" ]; then
          echo "Dylib not found, searching..."
          find . -name "*.dylib" 2>/dev/null
          exit 1
        fi
        echo "Found: $DYLIB"
        
        # roothide structure: /var/jb/
        mkdir -p pkg/var/jb/Library/MobileSubstrate/DynamicLibraries
        mkdir -p pkg/DEBIAN
        
        cp "$DYLIB" pkg/var/jb/Library/MobileSubstrate/DynamicLibraries/VCamJoyTweak.dylib
        cp VCamJoyTweak.plist pkg/var/jb/Library/MobileSubstrate/DynamicLibraries/VCamJoyTweak.plist
        
        ldid -S pkg/var/jb/Library/MobileSubstrate/DynamicLibraries/VCamJoyTweak.dylib
        
        cat > pkg/DEBIAN/control << 'CTRL'
Package: com.vcamjoy.tweak
Name: VCamJoy Tweak
Version: 1.0
Architecture: iphoneos-arm64
Description: Virtual Camera roothide palera1n
Maintainer: vcamjoy
Section: Tweaks
Tag: compatible_min(roothide)
CTRL
        
        mkdir -p packages
        dpkg-deb -Zgzip -b pkg packages/com.vcamjoy.tweak_1.0_roothide.deb
        echo "Done: $(ls -la packages/)"

    - name: Upload DEB
      uses: actions/upload-artifact@v4
      with:
        name: VCamJoy-Tweak-roothide
        path: packages/*.deb
        retention-days: 7
