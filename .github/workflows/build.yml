name: Build VCamJoy (App + Tweak)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Fix permissions
        run: |
          chmod 755 layout/DEBIAN/postinst
          ls -la layout/DEBIAN/

      - name: Setup Theos
        run: |
          export THEOS=$HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH
          git clone --recursive https://github.com/theos/theos $HOME/theos

      - name: Install SDK
        run: |
          curl -LO "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz"
          tar xf iPhoneOS16.5.sdk.tar.xz -C $HOME/theos/sdks/

      - name: Install tools
        run: brew install ldid dpkg

      - name: Build DEB (rootless)
        run: |
          export THEOS=$HOME/theos
          export PATH=$THEOS/bin:$PATH
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless 2>&1
          ls -la packages/

      - name: Show DEB contents
        run: |
          DEB=$(ls packages/*.deb | head -1)
          echo "=== DEB: $DEB ==="
          dpkg-deb --contents "$DEB"

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: VCamJoy-DEB
          path: packages/*.deb
          if-no-files-found: error
          retention-days: 30
