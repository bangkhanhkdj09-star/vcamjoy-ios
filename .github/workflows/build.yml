name: Build VCamJoy Tweak

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        uses: actions/cache@v4
        with:
          path: /opt/theos
          key: theos-${{ runner.os }}-v1

      - name: Install Theos
        run: |
          if [ ! -d /opt/theos ]; then
            git clone --recursive https://github.com/theos/theos /opt/theos
          fi
          echo "THEOS=/opt/theos" >> $GITHUB_ENV

      - name: Install SDK
        run: |
          mkdir -p /opt/theos/sdks
          if [ ! -d /opt/theos/sdks/iPhoneOS16.5.sdk ]; then
            curl -LO https://github.com/theos/sdks/releases/download/master/iPhoneOS16.5.sdk.tar.xz
            tar -xf iPhoneOS16.5.sdk.tar.xz -C /opt/theos/sdks/
          fi

      - name: Build
        run: |
          export THEOS=/opt/theos
          make package FINALPACKAGE=1

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: vcamjoy-tweak-deb
          path: packages/*.deb
