name: Build VCamJoy Tweak DEB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Setup Theos
      run: |
        set -e
        export THEOS=$HOME/theos
        git clone --recursive https://github.com/theos/theos $THEOS
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH

    - name: Install SDK
      run: |
        curl -LO "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz"
        tar xf iPhoneOS16.5.sdk.tar.xz -C $HOME/theos/sdks/
        echo "SDK OK: $(ls $HOME/theos/sdks/)"

    - name: Install Toolchain
      run: |
        brew install ldid xz
        # macOS đã có clang cho arm64 iOS
        echo "Toolchain OK"

    - name: Build DEB
      run: |
        export THEOS=$HOME/theos
        export PATH=$THEOS/bin:$PATH
        make package FINALPACKAGE=1 2>&1
        ls packages/ || echo "No packages dir"

    - name: Upload DEB
      uses: actions/upload-artifact@v4
      with:
        name: VCamJoy-Tweak-DEB
        path: packages/*.deb
        retention-days: 7
