name: Build DEB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Cấp quyền write để tạo Release
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ldid va make
        run: |
          brew install ldid make
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: Cache Theos
        uses: actions/cache@v4
        id: cache-theos
        with:
          path: ~/theos
          key: theos-macos-v5

      - name: Install Theos
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos

      - name: Link iOS SDK tu Xcode
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          SDK_VER=$(xcrun --sdk iphoneos --show-sdk-version)
          mkdir -p ~/theos/sdks
          ln -sf "$SDK_PATH" "$HOME/theos/sdks/iPhoneOS${SDK_VER}.sdk"
          ls ~/theos/sdks/

      - name: Build .deb
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless 2>&1

      - name: List packages
        run: ls -la packages/

      # Artifact: tải thẳng từ tab Actions, không cần Release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyTweak-deb
          path: packages/*.deb
          if-no-files-found: error

      # Release: chỉ chạy khi push tag v*
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
