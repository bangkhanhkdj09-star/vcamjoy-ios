name: Build VCamJoy IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode 15
      run: sudo xcode-select -s /Applications/Xcode_15.4.app

    - name: Install ldid
      run: brew install ldid

    - name: Build .app
      run: |
        xcodebuild \
          -project VCamJoy/VCamJoy.xcodeproj \
          -scheme VCamJoy \
          -configuration Release \
          -sdk iphoneos \
          -arch arm64 \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          GCC_TREAT_WARNINGS_AS_ERRORS=NO \
          CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS=NO \
          ONLY_ACTIVE_ARCH=NO \
          ENABLE_BITCODE=NO \
          DEPLOYMENT_POSTPROCESSING=YES \
          STRIP_INSTALLED_PRODUCT=YES \
          -derivedDataPath build/

    - name: Find built .app
      run: |
        APP=$(find build -name "VCamJoy.app" | head -1)
        echo "APP_PATH=$APP" >> $GITHUB_ENV
        echo "Found: $APP"
        ls "$APP"

    - name: Sign with ldid for Palera1n roothide
      run: |
        # Sign với entitlements đặc biệt cho roothide
        cat > ent.plist << 'ENTEOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>platform-application</key><true/>
          <key>com.apple.private.security.no-container</key><true/>
          <key>com.apple.private.skip-library-validation</key><true/>
          <key>get-task-allow</key><true/>
          <key>com.apple.developer.kernel.increased-memory-limit</key><true/>
          <key>com.apple.private.security.storage.AppDataContainers</key><true/>
        </dict>
        </plist>
        ENTEOF
        ldid -Sent.plist "${{ env.APP_PATH }}/VCamJoy"
        echo "Signed OK"

    - name: Package as .ipa
      run: |
        mkdir -p Payload
        cp -r "${{ env.APP_PATH }}" Payload/VCamJoy.app
        zip -r VCamJoy.ipa Payload/
        echo "IPA size: $(du -sh VCamJoy.ipa | cut -f1)"

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: VCamJoy-IPA
        path: VCamJoy.ipa
        retention-days: 7
