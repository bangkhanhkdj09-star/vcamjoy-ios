name: Build DEB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # macOS runner có Xcode sẵn -> không cần tải SDK
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Theos
        uses: actions/cache@v4
        id: cache-theos
        with:
          path: ~/theos
          key: theos-macos-${{ hashFiles('Makefile') }}-v3

      - name: Install Theos
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos

      - name: Link SDK từ Xcode
        run: |
          XCODE_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "Xcode SDK: $XCODE_SDK"
          mkdir -p ~/theos/sdks
          SDK_NAME=$(basename "$XCODE_SDK")
          ln -sf "$XCODE_SDK" "$HOME/theos/sdks/$SDK_NAME"
          # Tạo symlink iOS 16.5 nếu version khác
          ls ~/theos/sdks/

      - name: Set Makefile SDK version
        run: |
          # Lấy version SDK thực tế của Xcode
          SDK_VER=$(xcrun --sdk iphoneos --show-sdk-version)
          echo "SDK version: $SDK_VER"
          # Ghi vào env để dùng ở bước build
          echo "IPHONE_SDK_VERSION=$SDK_VER" >> $GITHUB_ENV

      - name: Build .deb
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless 2>&1

      - name: List packages
        run: ls -la packages/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyTweak-deb
          path: packages/*.deb
          if-no-files-found: error

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "MyTweak v1.0.${{ github.run_number }}"
          body: |
            Build tu dong tu GitHub Actions (macOS).
            - RootHide palera1n iOS 16.7.11 / 16.7.12
            - Bubble test panel de kiem tra .deb hoat dong
          files: packages/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
