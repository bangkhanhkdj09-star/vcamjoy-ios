name: Build DEB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential fakeroot dpkg-dev curl git \
            clang lld llvm zip unzip

      - name: Cache Theos
        uses: actions/cache@v4
        id: cache-theos
        with:
          path: /opt/theos
          key: theos-${{ runner.os }}-v2

      - name: Install Theos
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone --recursive https://github.com/theos/theos.git /opt/theos

      - name: Cache iOS SDK
        uses: actions/cache@v4
        id: cache-sdk
        with:
          path: /opt/theos/sdks/iPhoneOS16.5.sdk
          key: sdk-ios16-v1

      - name: Download iOS 16.5 SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p /opt/theos/sdks
          # Dùng ioskit/sdks — nguồn đáng tin cậy nhất cho Theos
          curl -L --retry 3 \
            "https://github.com/ioskit/sdks/releases/download/iPhoneOS-16.5/iPhoneOS16.5.sdk.tar.xz" \
            -o /tmp/sdk.tar.xz
          file /tmp/sdk.tar.xz
          tar -xJf /tmp/sdk.tar.xz -C /opt/theos/sdks/
          ls /opt/theos/sdks/

      - name: Set THEOS env
        run: echo "THEOS=/opt/theos" >> $GITHUB_ENV

      - name: Install Theos NIC template
        run: |
          export THEOS=/opt/theos
          # Đảm bảo theos-jailed và logos được cài
          cd /opt/theos
          git submodule update --init --recursive

      - name: Build .deb
        run: |
          export THEOS=/opt/theos
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless 2>&1

      - name: List packages
        run: ls -la packages/ || echo "No packages dir"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyTweak-deb
          path: packages/*.deb
          if-no-files-found: error

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "MyTweak v1.0.${{ github.run_number }}"
          body: |
            Build tu dong tu GitHub Actions.
            - RootHide palera1n iOS 16.7.11 / 16.7.12
            - Bubble test panel de kiem tra .deb hoat dong
          files: packages/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
