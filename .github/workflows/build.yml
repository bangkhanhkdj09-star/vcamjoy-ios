name: Build VCamJoy Tweak

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q fakeroot libxml2 xz-utils curl git make

      - name: Cache Theos
        uses: actions/cache@v4
        id: theos-cache
        with:
          path: /opt/theos
          key: theos-${{ runner.os }}-v6

      - name: Install Theos
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: |
          git clone --recursive https://github.com/theos/theos /opt/theos

      - name: Cache Toolchain
        uses: actions/cache@v4
        id: toolchain-cache
        with:
          path: /opt/theos/toolchain
          key: theos-toolchain-${{ runner.os }}-v6

      - name: Install Toolchain
        if: steps.toolchain-cache.outputs.cache-hit != 'true'
        run: |
          # Toolchain chính thức từ kabiroberai (clang cho iOS trên Linux)
          mkdir -p /opt/theos/toolchain
          curl -L -o /tmp/toolchain.tar.gz \
            "https://github.com/kabiroberai/swift-toolchain-linux/releases/download/v2.3.0/toolchain-linux.tar.gz" \
            --retry 3 --connect-timeout 30
          tar -xzf /tmp/toolchain.tar.gz -C /opt/theos/toolchain/
          echo "=== Toolchain bin ==="
          ls /opt/theos/toolchain/linux/iphone/bin/ | head -10

      - name: Cache SDK
        uses: actions/cache@v4
        id: sdk-cache
        with:
          path: /opt/theos/sdks
          key: theos-sdk-16.5-v2

      - name: Install SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /opt/theos/sdks
          curl -L -o /tmp/sdk.tar.xz \
            "https://github.com/theos/sdks/releases/download/master/iPhoneOS16.5.sdk.tar.xz" \
            --retry 3 --connect-timeout 30
          file /tmp/sdk.tar.xz
          tar -xJf /tmp/sdk.tar.xz -C /opt/theos/sdks/
          echo "=== SDKs ==="
          ls /opt/theos/sdks/

      - name: Build
        run: |
          export THEOS=/opt/theos
          export PATH="$THEOS/bin:$PATH"
          make package FINALPACKAGE=1

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: vcamjoy-tweak-deb
          path: packages/*.deb
          if-no-files-found: error
