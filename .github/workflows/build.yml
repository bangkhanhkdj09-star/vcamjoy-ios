name: Build DEB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential fakeroot dpkg-dev curl git

      - name: Setup Theos cache
        uses: actions/cache@v4
        with:
          path: /opt/theos
          key: theos-${{ runner.os }}-${{ hashFiles('Makefile') }}
          restore-keys: |
            theos-${{ runner.os }}-

      - name: Install Theos
        run: |
          if [ ! -d "/opt/theos" ]; then
            git clone --recursive https://github.com/theos/theos.git /opt/theos
          fi
          echo "THEOS=/opt/theos" >> $GITHUB_ENV

      - name: Download iOS 16 SDK
        run: |
          mkdir -p /opt/theos/sdks
          if [ ! -d "/opt/theos/sdks/iPhoneOS16.5.sdk" ]; then
            curl -L https://github.com/theos/sdks/releases/download/iOSTV-17.5_tvOS-17.5/iPhoneOS16.5.sdk.tar.xz \
              | tar -xJf - -C /opt/theos/sdks/
          fi

      - name: Install LLVM / Clang arm64
        run: |
          sudo apt-get install -y clang lld llvm

      - name: Build .deb
        run: |
          export THEOS=/opt/theos
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyTweak-deb
          path: packages/*.deb
          if-no-files-found: error

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "MyTweak v1.0.${{ github.run_number }}"
          body: |
            Build tu dong tu GitHub Actions.
            - RootHide palera1n iOS 16.7.11 / 16.7.12
            - Bubble test panel de kiem tra .deb hoat dong
          files: packages/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
