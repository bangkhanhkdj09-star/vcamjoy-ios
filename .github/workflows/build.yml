name: Build VCamJoy Tweak DEB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Setup Theos
      run: |
        export THEOS=$HOME/theos
        git clone --recursive https://github.com/theos/theos $THEOS
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH

    - name: Install SDK
      run: |
        curl -LO "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz"
        tar xf iPhoneOS16.5.sdk.tar.xz -C $HOME/theos/sdks/

    - name: Install tools
      run: brew install ldid dpkg

    - name: Build dylib
      run: |
        export THEOS=$HOME/theos
        export PATH=$THEOS/bin:$PATH
        make FINALPACKAGE=1 2>&1

    - name: Package roothide DEB manually
      run: |
        export THEOS=$HOME/theos
        export PATH=$THEOS/bin:$PATH
        
        # Find built dylib
        DYLIB=$(find .theos -name "*.dylib" | head -1)
        echo "Dylib: $DYLIB"
        
        # Build proper roothide deb structure
        mkdir -p deb_root/var/jb/Library/MobileSubstrate/DynamicLibraries
        
        # Copy dylib
        cp "$DYLIB" deb_root/var/jb/Library/MobileSubstrate/DynamicLibraries/VCamJoyTweak.dylib
        
        # Copy plist filter
        cp VCamJoyTweak.plist deb_root/var/jb/Library/MobileSubstrate/DynamicLibraries/VCamJoyTweak.plist
        
        # Sign
        ldid -S deb_root/var/jb/Library/MobileSubstrate/DynamicLibraries/VCamJoyTweak.dylib
        
        # Create DEBIAN control
        mkdir -p deb_root/DEBIAN
        cat > deb_root/DEBIAN/control << 'CTRL'
        Package: com.vcamjoy.tweak
        Name: VCamJoy Tweak
        Version: 1.0
        Architecture: iphoneos-arm64
        Description: Virtual Camera roothide
        Maintainer: vcamjoy
        Section: Tweaks
        Tag: compatible_min(roothide)
        CTRL
        
        # Build deb
        mkdir -p packages
        dpkg-deb -b deb_root packages/com.vcamjoy.tweak_1.0_roothide.deb
        echo "DEB: $(ls -la packages/)"

    - name: Upload DEB
      uses: actions/upload-artifact@v4
      with:
        name: VCamJoy-Tweak-roothide
        path: packages/*.deb
        retention-days: 7
