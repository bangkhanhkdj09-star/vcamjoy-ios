name: Build VCamJoy Tweak

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        uses: nickcoutsos/theos-action@v1
        # Action này tự động cài Theos + toolchain + SDK đúng cách

      - name: Build
        run: |
          make package FINALPACKAGE=1

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: vcamjoy-tweak-deb
          path: packages/*.deb
          if-no-files-found: error
