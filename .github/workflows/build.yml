name: Build VCamJoy IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14        # Mac miễn phí trên GitHub Actions
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode 15
      run: sudo xcode-select -s /Applications/Xcode_15.4.app

    - name: Install ldid (sign for JB)
      run: brew install ldid

    - name: Build .app
      run: |
        xcodebuild \
          -project VCamJoy/VCamJoy.xcodeproj \
          -scheme VCamJoy \
          -configuration Release \
          -sdk iphoneos \
          -arch arm64 \
          CODE_SIGNING_ALLOWED=NO \
          ONLY_ACTIVE_ARCH=NO \
          ENABLE_BITCODE=NO \
          DEPLOYMENT_POSTPROCESSING=YES \
          STRIP_INSTALLED_PRODUCT=YES \
          -derivedDataPath build/

    - name: Find built .app
      run: |
        APP=$(find build -name "*.app" | head -1)
        echo "APP_PATH=$APP" >> $GITHUB_ENV
        echo "Found: $APP"

    - name: Sign with ldid (JB entitlements)
      run: |
        ldid -Sentitlements.plist "${{ env.APP_PATH }}/VCamJoy"

    - name: Package as .ipa
      run: |
        mkdir -p Payload
        cp -r "${{ env.APP_PATH }}" Payload/
        zip -r VCamJoy.ipa Payload/
        echo "IPA size: $(du -sh VCamJoy.ipa | cut -f1)"

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: VCamJoy-IPA
        path: VCamJoy.ipa
        retention-days: 7
