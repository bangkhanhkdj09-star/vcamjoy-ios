name: Build VCamJoy Tweak

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          export THEOS=/opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV

          if [ ! -d /opt/theos ]; then
            git clone --recursive https://github.com/theos/theos /opt/theos
          fi

          # Install dependencies
          sudo apt-get update -q
          sudo apt-get install -y -q fakeroot libxml2 xz-utils

      - name: Cache SDK
        uses: actions/cache@v4
        id: sdk-cache
        with:
          path: /opt/theos/sdks
          key: theos-sdk-16.5

      - name: Install SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /opt/theos/sdks
          # Dùng SDKs từ theos/sdks release page (tar.xz thật)
          curl -L -o /tmp/sdk.tar.xz \
            "https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz" \
            --retry 3 --retry-delay 5
          
          # Verify file
          file /tmp/sdk.tar.xz
          
          # Extract
          tar -xJf /tmp/sdk.tar.xz -C /opt/theos/sdks/
          ls /opt/theos/sdks/

      - name: Build
        run: |
          export THEOS=/opt/theos
          make package FINALPACKAGE=1 2>&1

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: vcamjoy-tweak-deb
          path: packages/*.deb
          if-no-files-found: error
