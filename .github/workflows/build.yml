name: Build VCamJoy Tweak DEB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Setup Theos
      run: |
        export THEOS=$HOME/theos
        git clone --recursive https://github.com/theos/theos $THEOS
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH

    - name: Install SDK
      run: |
        curl -LO "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz"
        tar xf iPhoneOS16.5.sdk.tar.xz -C $HOME/theos/sdks/

    - name: Install tools
      run: brew install ldid dpkg

    - name: Build dylib
      run: |
        export THEOS=$HOME/theos
        export PATH=$THEOS/bin:$PATH
        make FINALPACKAGE=1 ARCHS="arm64 arm64e" TARGET=iphone:clang:16.5:15.0 2>&1

    - name: Package roothide DEB
      run: |
        DYLIB=$(find .theos -name "VCamJoyTweak.dylib" 2>/dev/null | head -1)
        if [ -z "$DYLIB" ]; then
          echo "ERROR: dylib not found"
          find . -name "*.dylib" 2>/dev/null
          exit 1
        fi
        echo "Found dylib: $DYLIB"
        mkdir -p pkg/var/jb/Library/MobileSubstrate/DynamicLibraries
        mkdir -p pkg/DEBIAN
        cp "$DYLIB" pkg/var/jb/Library/MobileSubstrate/DynamicLibraries/VCamJoyTweak.dylib
        cp VCamJoyTweak.plist pkg/var/jb/Library/MobileSubstrate/DynamicLibraries/VCamJoyTweak.plist
        ldid -S pkg/var/jb/Library/MobileSubstrate/DynamicLibraries/VCamJoyTweak.dylib
        printf "Package: com.vcamjoy.tweak\nName: VCamJoy Tweak\nVersion: 1.0\nArchitecture: iphoneos-arm64\nDescription: Virtual Camera roothide\nMaintainer: vcamjoy\nSection: Tweaks\nTag: compatible_min(roothide)\n" > pkg/DEBIAN/control
        mkdir -p packages
        dpkg-deb -Zgzip -b pkg packages/com.vcamjoy.tweak_1.0_roothide.deb
        echo "Done: $(ls -la packages/)"

    - name: Upload DEB
      uses: actions/upload-artifact@v4
      with:
        name: VCamJoy-Tweak-roothide
        path: packages/*.deb
        retention-days: 7
