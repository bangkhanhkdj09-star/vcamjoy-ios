name: Build deb

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      package_scheme:
        description: "Theos package scheme"
        required: true
        default: "rootless"
        type: choice
        options:
          - rootless
          - rootful

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install dependencies
        run: |
          brew update
          brew install ldid xz

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"

      - name: Build package
        env:
          THEOS_PACKAGE_SCHEME: ${{ github.event.inputs.package_scheme || 'rootless' }}
        run: |
          if [ "$THEOS_PACKAGE_SCHEME" = "rootless" ]; then
            make clean package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          else
            make clean package FINALPACKAGE=1
          fi

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: CleanVCamLocal-${{ github.sha }}
          path: packages/*.deb
          if-no-files-found: error
